name: Haskell CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-guard:
    uses: ./.github/workflows/repo-guard.yml

  build-and-test:
    name: Build and Test
    runs-on: [self-hosted, haskell-slim]
    needs: repo-guard
    timeout-minutes: 30

    strategy:
      matrix:
        ghc: ['9.6.7']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set CABAL_DIR
        run: echo "CABAL_DIR=$HOME/.cabal" >> "$GITHUB_ENV"

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ matrix.ghc }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ matrix.ghc }}-
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Install ormolu
        run: |
          if ! command -v ormolu &>/dev/null; then
            cabal install ormolu --install-method=copy --installdir=/usr/local/bin
          fi
      - name: Check formatting (ormolu)
        run: ormolu --mode check $(find src app test -name '*.hs')

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct

      - name: Test with coverage
        run: |
          cabal test all --enable-coverage --test-show-details=direct
          echo "Coverage report generated"

      - name: Build with HIE files for weeder
        run: cabal build all --ghc-options="-fwrite-ide-info -hiedir=.hie"

      - name: Run weeder (dead code detection)
        run: |
          if command -v weeder >/dev/null 2>&1; then
            weeder --hie-directory .hie --hie-file-extension .hie || echo "weeder found issues (non-blocking)"
          else
            echo "weeder not installed, skipping dead code check"
          fi

      - name: Static analysis (stan)
        run: |
          if command -v stan >/dev/null 2>&1; then
            stan --hiedir=.hie report || echo "stan found issues (non-blocking)"
          else
            echo "stan not installed, skipping static analysis"
          fi

      - name: Orchestrator self-scan (SARIF)
        run: |
          if command -v orchestrator >/dev/null 2>&1; then
            orchestrator scan .github/workflows/ --sarif > orchestrator-results.sarif 2>/dev/null || true
          elif [ -f dist-newstyle/build/*/ghc-*/orchestrator-*/x/orchestrator/build/orchestrator/orchestrator ]; then
            ORCH=$(find dist-newstyle -name orchestrator -type f -executable | head -1)
            "$ORCH" scan .github/workflows/ --sarif > orchestrator-results.sarif 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Upload SARIF results
        if: always() && hashFiles('orchestrator-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: orchestrator-results.sarif
        continue-on-error: true

      - name: Generate Haddock docs
        run: cabal haddock all --haddock-html 2>&1 | tail -5

  lint:
    name: Lint
    runs-on: [self-hosted, haskell-slim]
    needs: repo-guard
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HLint
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: hlint src/ app/ 2>&1 | cat

  capability-check:
    name: Capability Contract Check
    runs-on: [self-hosted, haskell-slim]
    needs: repo-guard
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no Business/Enterprise module imports
        run: |
          if grep -rI --include='*.hs' 'OrchestratorBusiness\|OrchestratorEnterprise' src/ app/ 2>/dev/null; then
            echo "::error::LEAK DETECTED: Source imports Business or Enterprise modules"
            exit 1
          fi
          if grep -rI --include='*.cabal' 'OrchestratorBusiness\|OrchestratorEnterprise' . 2>/dev/null; then
            echo "::error::LEAK DETECTED: .cabal file references Business or Enterprise modules"
            exit 1
          fi
          echo "Capability contract check passed — Community tier only"

  orchestrator-self-check:
    name: "Orchestrator Self-Check"
    runs-on: [self-hosted, haskell-slim]
    needs: [build-and-test]
    timeout-minutes: 10
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Restore cabal cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-selfcheck-${{ hashFiles('orchestrator.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-selfcheck-
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Run Orchestrator against own workflows
        run: |
          cabal run orchestrator -- scan .github/workflows/ --fail-on error
