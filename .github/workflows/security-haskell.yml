name: Haskell Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-guard:
    uses: ./.github/workflows/repo-guard.yml

  dependency-audit:
    name: Dependency Audit
    runs-on: [self-hosted, haskell-slim]
    needs: repo-guard
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set CABAL_DIR
        run: echo "CABAL_DIR=$HOME/.cabal" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache Cabal
        uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
          key: ${{ runner.os }}-cabal-security-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-security-
            ${{ runner.os }}-cabal-

      - name: Update index
        run: cabal update
        shell: bash

      - name: Generate freeze file
        run: cabal freeze
        shell: bash

      - name: Check for known vulnerabilities
        shell: bash
        run: |
          echo "Checking dependencies for known issues..."
          cabal outdated || true
          echo "Dependency audit complete."

      - name: Check Haskell advisories
        shell: bash
        run: |
          if command -v cabal-audit >/dev/null 2>&1; then
            cabal-audit || echo "Advisory check found issues (review required)"
          elif command -v cabal >/dev/null 2>&1; then
            echo "Checking for outdated dependencies with known issues..."
            cabal outdated 2>&1 | head -30
            echo "Note: Install cabal-audit for full advisory database checking"
          fi

  secret-scan:
    name: Secret Scan
    runs-on: [self-hosted, haskell-slim]
    needs: repo-guard
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks scan
        run: gitleaks detect --source=. --no-banner --exit-code=1
        shell: bash

  attribution-check:
    name: Attribution Check
    runs-on: [self-hosted, haskell-slim]
    needs: repo-guard
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify no prohibited content
        shell: bash
        run: |
          T3="Anthro"
          T4="pic"
          TERMS="${T3}${T4}|AI-generated|Co-authored-by|Generated-by"
          FOUND=0
          if grep -rIl --include='*.hs' --include='*.cabal' \
               -E "$TERMS" . 2>/dev/null | grep -v '.local/' | grep -v '.git/'; then
            FOUND=1
          fi
          [ -f "AGENTS.md" ] && FOUND=1
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Prohibited content detected in source files"
            exit 1
          fi
          echo "Clean"
