name: Orchestrator Scan (Reusable)

on:
  workflow_call:
    inputs:
      fail-on:
        description: "Severity threshold for CI failure (info|warning|error|critical|none)"
        required: false
        type: string
        default: "error"
      tags:
        description: "Comma-separated rule tags to evaluate (security,performance,cost,style,structure)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  orchestrator-scan:
    name: Orchestrator Workflow Scan
    runs-on: [self-hosted, Linux, X64, haskell, unified-all]
    timeout-minutes: 10
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
      SCAN_FAIL_ON: ${{ inputs.fail-on }}
      SCAN_TAGS: ${{ inputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout Orchestrator
        uses: actions/checkout@v4
        with:
          repository: Al-Sarraf-Tech/Haskell-Orchestrator
          ref: v4.0.0
          path: .orchestrator-tool
          persist-credentials: false

      - name: Restore cabal cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cabal/store
            .orchestrator-tool/dist-newstyle
          key: orchestrator-scan-${{ runner.os }}-v4.0.0
          restore-keys: |
            orchestrator-scan-${{ runner.os }}-

      - name: Update package index
        run: cabal update
        working-directory: .orchestrator-tool

      - name: Build Orchestrator
        run: cabal build exe:orchestrator -O2
        working-directory: .orchestrator-tool

      - name: Run scan
        shell: bash
        run: |
          ARGS="scan ${GITHUB_WORKSPACE}/.github/workflows/"

          if [ "$SCAN_FAIL_ON" != "none" ] && [ -n "$SCAN_FAIL_ON" ]; then
            ARGS="$ARGS --fail-on $SCAN_FAIL_ON"
          fi

          if [ -n "$SCAN_TAGS" ]; then
            for tag in $(echo "$SCAN_TAGS" | tr ',' ' '); do
              ARGS="$ARGS --tags $tag"
            done
          fi

          echo "Running: orchestrator $ARGS"
          cd .orchestrator-tool && cabal run orchestrator -- $ARGS
