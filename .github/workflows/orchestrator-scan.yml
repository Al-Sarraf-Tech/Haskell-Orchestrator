name: Orchestrator Scan (Reusable)

on:
  workflow_call:
    inputs:
      fail-on:
        description: "Severity threshold for CI failure (info|warning|error|critical|none)"
        required: false
        type: string
        default: "error"
      tags:
        description: "Comma-separated rule tags to evaluate (security,performance,cost,style,structure)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  orchestrator-scan:
    name: Orchestrator Workflow Scan
    runs-on: [self-hosted, Linux, X64, haskell, unified-all]
    timeout-minutes: 5
    env:
      SCAN_FAIL_ON: ${{ inputs.fail-on }}
      SCAN_TAGS: ${{ inputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Orchestrator Enterprise scan
        shell: bash
        run: |
          ORCH="/usr/local/bin/orchestrator-enterprise"
          if [ ! -x "$ORCH" ]; then
            echo "::error::orchestrator-enterprise not found — ensure runner has the binary mounted"
            exit 1
          fi

          # Global flags go before the subcommand
          GLOBAL_FLAGS=""
          if [ "$SCAN_FAIL_ON" != "none" ] && [ -n "$SCAN_FAIL_ON" ]; then
            GLOBAL_FLAGS="$GLOBAL_FLAGS --fail-on $SCAN_FAIL_ON"
          fi

          if [ -n "$SCAN_TAGS" ]; then
            for tag in $(echo "$SCAN_TAGS" | tr ',' ' '); do
              GLOBAL_FLAGS="$GLOBAL_FLAGS --tags $tag"
            done
          fi

          echo "Running: orchestrator-enterprise $GLOBAL_FLAGS scan .github/workflows/ (40 rules)"
          "$ORCH" $GLOBAL_FLAGS scan .github/workflows/
